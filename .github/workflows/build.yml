name: Build installers

# Builds installers (.deb / .AppImage) when requested:
#   - manually from the Actions tab with "Run workflow"
#   - automatically when pushing a vX.Y.Z tag, also creating a Release
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create Releases from tags

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: System dependencies (Tauri 2)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            file \
            wget \
            libssl-dev

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install JS dependencies
        run: npm ci

      - name: Download llama.cpp binary
        run: ./scripts/setup-llama.sh

      - name: Build app (.deb and .AppImage)
        run: npm run tauri build

      - name: List artifacts
        run: ls -lh src-tauri/target/release/bundle/deb src-tauri/target/release/bundle/appimage

      - name: Upload installers as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-aleph-linux
          retention-days: 14
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Create/update Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # Tags with a hyphen (v0.2.0-beta.1) are published as prereleases.
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

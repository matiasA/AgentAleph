name: Build installers

# Builds installers (.deb / .AppImage) when requested:
#   - manually from the Actions tab with "Run workflow"
#   - automatically when pushing a vX.Y.Z tag, also creating a signed Release with latest.json
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create Releases from tags

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: System dependencies (Tauri 2)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            file \
            wget \
            libssl-dev

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install JS dependencies
        run: npm ci

      - name: Download llama.cpp binary
        run: ./scripts/setup-llama.sh

      - name: Build and release (signed + latest.json)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Tags with a hyphen (v0.2.0-beta.1) are published as prereleases.
          prerelease: ${{ contains(github.ref_name, '-') }}
          # Only create a release on tag pushes; on workflow_dispatch just upload artifacts.
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseBody: "See the release notes above."
          releaseDraft: false
          includeUpdaterJson: true

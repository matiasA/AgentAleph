name: Build installers

# Genera los instalables (.deb / .AppImage) cuando lo pidamos:
#   - manualmente desde la pestaña "Actions" (botón "Run workflow")
#   - automáticamente al empujar un tag vX.Y.Z (además crea un Release)
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write # para crear Releases en tags

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependencias del sistema (Tauri 2)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            file \
            wget \
            libssl-dev

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache de Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Instalar deps JS
        run: npm ci

      - name: Descargar binario de llama.cpp
        run: ./scripts/setup-llama.sh

      - name: Build de la app (genera .deb y .AppImage)
        run: npm run tauri build

      - name: Listar artefactos
        run: ls -lh src-tauri/target/release/bundle/deb src-tauri/target/release/bundle/appimage

      - name: Subir instalables como artefactos
        uses: actions/upload-artifact@v4
        with:
          name: agent-aleph-linux
          retention-days: 14
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Crear/actualizar Release (solo en tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
